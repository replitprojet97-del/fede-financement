kind = "mobile"
previewPath = "/mobile/"
title = "CapSubvention — Application Mobile"
version = "1.0.0"
id = "artifacts/capsubvention-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21124

[services.development]
run = "pnpm --filter @workspace/capsubvention-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capsubvention-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/capsubvention-mobile", "run", "serve" ]

[services.env]
PORT = "21124"
BASE_PATH = "/mobile/"
