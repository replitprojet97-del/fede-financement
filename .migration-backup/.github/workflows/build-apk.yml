name: Build APK Android — CapSubvention

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profil de build"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build APK (EAS Cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Installer les dépendances du monorepo
        run: pnpm install --frozen-lockfile

      - name: Installer EAS CLI
        run: npm install -g eas-cli

      - name: Initialiser le projet Expo (premier lancement uniquement)
        working-directory: artifacts/capsubvention-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas init --non-interactive --force || true

      - name: Lancer le build Android sur les serveurs Expo
        working-directory: artifacts/capsubvention-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Instructions de téléchargement
        run: |
          echo ""
          echo "✅ Build lancé avec succès sur les serveurs Expo !"
          echo ""
          echo "⏱️  Durée estimée : 10 à 15 minutes"
          echo ""
          echo "📲 Suivez l'avancement ici :"
          echo "   https://expo.dev/accounts/[votre-compte]/projects/capsubvention-mobile/builds"
          echo ""
          echo "📧 Un e-mail avec le lien de téléchargement vous sera envoyé."
          echo ""
          echo "📦 Une fois téléchargé, renommez le fichier 'capsubvention-app.apk'"
          echo "   et déposez-le dans : artifacts/financedom/public/"
